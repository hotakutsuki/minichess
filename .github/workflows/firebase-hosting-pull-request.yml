# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools
# Builds the Flutter web app, then deploys it to a Firebase Hosting preview channel.

name: Deploy to Firebase Hosting on PR
'on': pull_request
jobs:
  build_and_preview:
    if: '${{ github.event.pull_request.head.repo.full_name == github.repository }}'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Write firebase_options.dart (gitignored, injected from secret)
        env:
          FIREBASE_OPTIONS: ${{ secrets.FIREBASE_OPTIONS_DART }}
        run: printf '%s' "$FIREBASE_OPTIONS" > lib/firebase_options.dart
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build web --release
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_MINICHESS_34A02 }}'
          projectId: minichess-34a02
